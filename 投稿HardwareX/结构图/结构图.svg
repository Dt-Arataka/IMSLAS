<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="100%" height="100%">
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d32f2f" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1976d2" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#388e3c" />
    </marker>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbc02d" />
    </marker>
    <marker id="arrow-blue-rev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#1976d2" />
    </marker>
    <marker id="arrow-yellow-rev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#fbc02d" />
    </marker>
    
    <pattern id="mesh-pattern" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 8 8 M 8 0 L 0 8" stroke="#333" stroke-width="0.5" />
    </pattern>
  </defs>

  <style>
    .font-base { font-family: 'Arial', sans-serif; }
    .title { font-size: 18px; font-weight: bold; fill: #000; }
    .text-sm { font-size: 12px; fill: #000; }
    .text-md { font-size: 14px; font-weight: bold; fill: #000; }
    .text-gray { font-size: 10px; fill: #666; }
    
    .box-white { fill: #ffffff; stroke: #333; stroke-width: 2px; rx: 4px; ry: 4px; }
    .box-mcu { fill: #f0f0f0; stroke: #333; stroke-width: 2px; rx: 6px; ry: 6px; }
    .box-mem { fill: #fff59d; stroke: #333; stroke-width: 2px; rx: 4px; ry: 4px; }
    .box-tube { fill: #f5f5f5; stroke: #333; stroke-width: 2px; rx: 20px; ry: 20px; }
    
    .line-pwr { stroke: #d32f2f; stroke-width: 3px; fill: none; }
    .line-dig { stroke: #1976d2; stroke-width: 3px; fill: none; }
    .line-ana { stroke: #388e3c; stroke-width: 3px; fill: none; }
    .line-mem { stroke: #fbc02d; stroke-width: 3px; fill: none; }
  </style>

  <rect x="200" y="50" width="650" height="380" fill="none" stroke="#000" stroke-width="3" rx="8" ry="8" />
  <text x="525" y="75" class="font-base title" text-anchor="middle">IMS CONTROL SYSTEM MAIN BOARD (N16R8 VARIANT)</text>

  <text x="210" y="385" class="font-base text-gray" text-anchor="start">
    <tspan x="210" dy="0">KEY SIGNALS</tspan>
    <tspan x="210" dy="12">DIGITAL SIGNALS</tspan>
    <tspan x="210" dy="12">PARGD3, GAM3</tspan>
    <tspan x="210" dy="12">RELS, DUD-0</tspan>
  </text>

  <rect x="330" y="110" width="400" height="150" class="box-mcu" />
  <text x="530" y="135" class="font-base title" text-anchor="middle">ESP32-S3 Dual-Core MCU</text>

  <rect x="350" y="150" width="170" height="50" class="box-white" />
  <text x="435" y="170" class="font-base text-md" text-anchor="middle">Core 0</text>
  <text x="435" y="188" class="font-base text-sm" text-anchor="middle">(Data Acquisition/Timing)</text>

  <rect x="540" y="150" width="170" height="50" class="box-white" />
  <text x="625" y="170" class="font-base text-md" text-anchor="middle">Core 1</text>
  <text x="625" y="188" class="font-base text-sm" text-anchor="middle">(UI/Network)</text>

  <rect x="350" y="215" width="360" height="30" fill="#e0e0e0" stroke="#333" stroke-width="2" rx="2" ry="2" />
  <text x="530" y="235" class="font-base text-sm" text-anchor="middle">512 KB Internal SRAM</text>

  <rect x="380" y="310" width="150" height="50" class="box-white" />
  <text x="455" y="330" class="font-base text-sm" text-anchor="middle">16-bit 1 MSPS ADC</text>
  <text x="455" y="348" class="font-base text-sm" text-anchor="middle">(ADS8681)</text>

  <rect x="560" y="310" width="90" height="50" class="box-mem" />
  <text x="605" y="330" class="font-base text-sm" text-anchor="middle">16 MB Flash</text>
  <text x="605" y="348" class="font-base text-sm" text-anchor="middle">(N16)</text>

  <rect x="670" y="310" width="70" height="50" class="box-mem" />
  <text x="705" y="330" class="font-base text-sm" text-anchor="middle">8 MB</text>
  <text x="705" y="348" class="font-base text-sm" text-anchor="middle">PSRAM (R8)</text>

  <rect x="40" y="90" width="130" height="40" class="box-white" />
  <text x="105" y="110" class="font-base text-md" text-anchor="middle">5V DC INPUT</text>
  <text x="105" y="125" class="font-base text-sm" text-anchor="middle">(Micro USB)</text>

  <rect x="30" y="150" width="150" height="50" class="box-white" />
  <text x="105" y="170" class="font-base text-md" text-anchor="middle">USB INTERFACE</text>
  <text x="105" y="188" class="font-base text-sm" text-anchor="middle">(CP2102/Prog)</text>

  <rect x="60" y="220" width="110" height="30" class="box-white" />
  <text x="115" y="240" class="font-base text-sm" text-anchor="middle">TF CARD SLOT</text>

  <rect x="60" y="270" width="110" height="30" class="box-white" />
  <text x="115" y="290" class="font-base text-sm" text-anchor="middle">STATUS LED</text>

  <rect x="20" y="320" width="160" height="50" class="box-white" />
  <text x="100" y="340" class="font-base text-md" text-anchor="middle">EXPANSION HEADER</text>
  <text x="100" y="358" class="font-base text-sm" text-anchor="middle">(2x5P IDC)</text>

  <rect x="220" y="270" width="80" height="40" class="box-white" />
  <text x="260" y="288" class="font-base text-sm" text-anchor="middle">PASSIVE</text>
  <text x="260" y="302" class="font-base text-sm" text-anchor="middle">BUZZER</text>

  <rect x="880" y="150" width="160" height="60" class="box-white" />
  <text x="960" y="172" class="font-base text-md" text-anchor="middle">3.5-inch TFT</text>
  <text x="960" y="188" class="font-base text-md" text-anchor="middle">TOUCHSCREEN</text>
  <text x="960" y="202" class="font-base text-sm" text-anchor="middle">(ILI9488 Driver)</text>

  <rect x="880" y="260" width="160" height="60" class="box-white" />
  <text x="960" y="282" class="font-base text-md" text-anchor="middle">WIFI (AP MODE)</text>
  <text x="960" y="298" class="font-base text-sm" text-anchor="middle">BROWSER-BASED</text>
  <text x="960" y="312" class="font-base text-sm" text-anchor="middle">REMOTE CONTROL</text>

  <rect x="200" y="520" width="600" height="90" class="box-tube" />
  <text x="500" y="635" class="font-base title" text-anchor="middle">IMS TUBE (USER-PROVIDED/INTEGRATED FRONT-END)</text>

  <rect x="220" y="535" width="60" height="60" class="box-white" />
  <text x="250" y="560" class="font-base text-md" text-anchor="middle">Ion</text>
  <text x="250" y="578" class="font-base text-md" text-anchor="middle">Source</text>

  <rect x="300" y="535" width="60" height="60" class="box-white" />
  <text x="330" y="560" class="font-base text-md" text-anchor="middle">Gating</text>
  <text x="330" y="578" class="font-base text-md" text-anchor="middle">Mesh</text>
  
  <rect x="360" y="535" width="20" height="60" fill="url(#mesh-pattern)" stroke="#333" />

  <text x="500" y="570" class="font-base title" text-anchor="middle" fill="#555">Drift Tube</text>

  <rect x="700" y="535" width="80" height="60" fill="#e8f5e9" stroke="#333" stroke-width="2" rx="4" ry="4" />
  <text x="740" y="568" class="font-base text-md" text-anchor="middle">Detector</text>

  <rect x="840" y="520" width="160" height="60" class="box-white" />
  <text x="920" y="542" class="font-base text-md" text-anchor="middle">HV GATE SIGNAL</text>
  <text x="920" y="558" class="font-base text-md" text-anchor="middle">GENERATOR</text>
  <text x="920" y="572" class="font-base text-sm" text-anchor="middle">(User-Provided)</text>

  <path d="M 170 110 L 220 110" class="line-pwr" marker-end="url(#arrow-red)" />
  <rect x="220" y="100" width="40" height="20" fill="#fff" stroke="#000" />
  <path d="M 220 110 Q 230 100 240 110 Q 250 120 260 110" fill="none" stroke="#000" /> <path d="M 260 110 L 300 110 L 300 175 L 330 175" class="line-pwr" marker-end="url(#arrow-red)" />
  <path d="M 300 175 L 300 290 L 220 290" class="line-pwr" marker-end="url(#arrow-red)" />
  <path d="M 300 175 L 180 175" class="line-pwr" marker-end="url(#arrow-red)" />

  <path d="M 455 430 L 455 520" class="line-pwr" marker-end="url(#arrow-red)" />
  <text x="445" y="450" class="font-base text-md" text-anchor="end">HV GATE CONTROL SIGNAL</text>
  <text x="445" y="465" class="font-base text-sm" text-anchor="end">(Digital Square Wave, from LEDC)</text>

  <path d="M 760 430 L 920 430 L 920 520" class="line-pwr" marker-end="url(#arrow-red)" />
  <path d="M 840 550 L 800 550" class="line-dig" marker-end="url(#arrow-blue)" />

  <path d="M 180 175 L 200 175 L 200 245 L 330 245" class="line-dig" marker-end="url(#arrow-blue)" marker-start="url(#arrow-blue-rev)" />
  
  <path d="M 730 180 L 880 180" class="line-dig" marker-end="url(#arrow-blue)" marker-start="url(#arrow-blue-rev)" />
  <text x="805" y="172" class="font-base text-md" text-anchor="middle">HSPI Bus</text>

  <path d="M 730 230 L 805 230 L 805 290 L 880 290" class="line-dig" marker-end="url(#arrow-blue)" />

  <path d="M 455 245 L 455 310" class="line-mem" marker-end="url(#arrow-yellow)" marker-start="url(#arrow-yellow-rev)" />
  <text x="465" y="280" class="font-base text-md" text-anchor="start">FSPI Bus</text>

  <path d="M 605 245 L 605 310" class="line-mem" marker-end="url(#arrow-yellow)" marker-start="url(#arrow-yellow-rev)" />
  <path d="M 705 245 L 705 310" class="line-mem" marker-end="url(#arrow-yellow)" marker-start="url(#arrow-yellow-rev)" />

  <path d="M 740 535 L 740 480 L 610 480" class="line-ana" marker-end="url(#arrow-green)" />
  
  <polygon points="580,470 580,490 610,480" fill="#fff" stroke="#000" stroke-width="2" />
  <text x="560" y="475" class="font-base text-sm" text-anchor="end">[User</text>
  <text x="560" y="488" class="font-base text-sm" text-anchor="end">TIA]</text>

  <path d="M 580 480 L 530 480 L 530 360" class="line-ana" marker-end="url(#arrow-green)" />
  <text x="540" y="415" class="font-base text-md" text-anchor="start">ANALOG SIGNAL</text>
  <text x="540" y="430" class="font-base text-sm" text-anchor="start">(Voltage from TIA via Header)</text>


  <rect x="880" y="600" width="160" height="90" class="box-white" />
  
  <path d="M 890 615 L 920 615" class="line-pwr" marker-end="url(#arrow-red)" />
  <text x="930" y="618" class="font-base text-sm" text-anchor="start">Power</text>

  <path d="M 890 635 L 920 635" class="line-dig" marker-end="url(#arrow-blue)" />
  <text x="930" y="638" class="font-base text-sm" text-anchor="start">Digital Control</text>

  <path d="M 890 655 L 920 655" class="line-ana" marker-end="url(#arrow-green)" />
  <text x="930" y="658" class="font-base text-sm" text-anchor="start">Analog Signal</text>

  <path d="M 890 675 L 920 675" class="line-mem" marker-end="url(#arrow-yellow)" marker-start="url(#arrow-yellow-rev)" />
  <text x="930" y="678" class="font-base text-sm" text-anchor="start">Memory Bus</text>

</svg>
